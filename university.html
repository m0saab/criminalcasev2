<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معهد آيسبريت العالي للإدارة والأعمال | ISPRIT School of Business</title>
    <style>
        :root {
            --primary: #a82323;
            --secondary: #0f172a;
            --accent: #ca8a04;
            --light: #f8fafc;
            --dark: #1e293b;
            --gray: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* Header & Nav */
        header { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000; }
        .top-bar { background: var(--secondary); color: white; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; max-width: 1200px; margin: 0 auto; }
        
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        .nav-container { display: flex; align-items: center; gap: 20px; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.9rem; }
        
        .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--secondary); }

        /* Mobile Responsive Navigation */
        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            .nav-container { 
                display: none; flex-direction: column; position: absolute; top: 100%; right: 0; 
                width: 100%; background: white; padding: 20px; border-bottom: 3px solid var(--primary);
                box-shadow: 0 10px 10px rgba(0,0,0,0.1);
            }
            .nav-container.active { display: flex; }
            .nav-links { flex-direction: column; width: 100%; text-align: center; gap: 15px; margin-bottom: 15px; }
        }

        /* Content Layouts */
        .hero { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; padding: 50px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats-grid, .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        /* Modals & Buttons */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; width: 90%; max-width: 400px; border-radius: 8px; position: relative; }
        .student-login-btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: bold; }
        
        /* Footer */
        footer { background: var(--secondary); color: white; padding: 40px 20px; margin-top: 50px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <span>بوابة الإعلانات والأنشطة اليومية للطلبة</span>
            <a href="#" style="color: #cbd5e1;">Français</a>
        </div>
        <nav>
            <a href="#" class="logo">ISPRIT</a>
            <button class="menu-toggle" onclick="document.querySelector('.nav-container').classList.toggle('active')">☰</button>
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="#">من نحن</a></li>
                    <li><a href="#">البرامج الأكاديمية</a></li>
                    <li><a href="#">جداول الأوقات</a></li>
                </ul>
                <a href="#" class="student-login-btn" onclick="toggleModal(true)">Log In</a>
            </div>
        </nav>
    </header>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <span onclick="toggleModal(false)" style="float: left; cursor: pointer; font-size: 1.5rem;">&times;</span>
            <h3>تسجيل دخول الطلبة</h3>
            <form onsubmit="event.preventDefault(); window.location.href='log.html'">
                <input type="text" placeholder="اسم المستخدم" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc;" required>
                <input type="password" placeholder="كلمة المرور" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc;" required>
                <button type="submit" style="width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; cursor: pointer;">دخول</button>
            </form>
        </div>
    </div>

    <section class="hero">
        <h1>فضاء المستجدات والأخبار اليومية</h1>
        <p>متابعة كافة التغييرات التنظيمية والفعاليات داخل المعهد.</p>
    </section>

    <div class="container">
        <div class="stats-grid">
            <div style="background: white; padding: 20px; border-top: 4px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3>1,825</h3>
                <p>إجمالي الخريجين</p>
            </div>
            </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('loginModal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
